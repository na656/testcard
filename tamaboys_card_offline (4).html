<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多摩ボーイズ 選手カードジェネレーター</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Helvetica Neue',Arial,sans-serif}
body{background:#1a1a2e;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{background:#fff;border-radius:16px;padding:28px;max-width:900px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.3)}
h1{font-size:15px;font-weight:700;color:#0a1f44;margin-bottom:20px;text-align:center;letter-spacing:.08em}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.panel{display:flex;flex-direction:column;gap:11px}
.field label{font-size:11px;color:#888;display:block;margin-bottom:4px;letter-spacing:.04em;text-transform:uppercase}
input[type=text]{width:100%;padding:8px 12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;transition:border .15s}
input[type=text]:focus{border-color:#0a1f44}
input[type=text]:disabled{opacity:.45;cursor:not-allowed;background:#f5f5f5}
.upload-area{border:1.5px dashed #ccc;border-radius:10px;padding:14px;text-align:center;cursor:pointer;position:relative;transition:background .15s;background:#fafafa;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.upload-area:hover{background:#f0f0f0}
.upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-area .u-text{font-size:12px;color:#999}
.upload-preview{max-height:70px;max-width:100%;border-radius:6px;object-fit:cover;display:none}
.fixed-badge{font-size:10px;background:#eee;color:#999;border-radius:4px;padding:2px 7px;display:inline-block;margin-top:2px}
.slider-row{display:grid;grid-template-columns:22px 1fr 22px;gap:6px;align-items:center}
.slider-row span{font-size:13px;color:#888;text-align:center}
input[type=range]{width:100%;accent-color:#0a1f44}
.section-title{font-size:11px;font-weight:700;color:#0a1f44;letter-spacing:.06em;text-transform:uppercase;border-bottom:1.5px solid #e8c44a;padding-bottom:4px;margin-top:4px}
.btn-gen{width:100%;padding:12px;background:#0a1f44;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.05em;transition:opacity .15s;margin-top:4px}
.btn-gen:hover{opacity:.82}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.btn-dl{padding:10px;background:transparent;color:#0a1f44;border:1.5px solid #0a1f44;border-radius:10px;font-size:12px;cursor:pointer;display:none;font-weight:600;transition:background .15s;text-align:center}
.btn-dl:hover{background:#f0f3f8}
.btn-dl.show{display:block}
.preview-wrap{background:#e8ecf2;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:420px;gap:10px;padding:16px}
.preview-wrap img{max-height:420px;max-width:100%;border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.28)}
.empty-hint{text-align:center;color:#aaa;font-size:13px;line-height:1.9}
.preview-label{font-size:11px;color:#888;text-align:center}
canvas{display:none}
</style>
</head>
<body>
<div class="container">
  <h1>⚾ 多摩ボーイズ 選手カードジェネレーター</h1>
  <div class="grid">
    <div class="panel">
      <div class="section-title">選手情報</div>
      <div class="field">
        <label>選手写真（JPEG / PNG）</label>
        <div class="upload-area">
          <input type="file" id="photoFile" accept="image/*">
          <div style="font-size:20px">📷</div>
          <div class="u-text" id="uText">タップして写真を選択</div>
          <img id="uPreview" class="upload-preview">
        </div>
      </div>
      <div class="section-title">写真の位置調整</div>
      <div class="field">
        <label>上下位置</label>
        <div class="slider-row"><span>↑</span><input type="range" id="offsetY" min="-100" max="100" value="0"><span>↓</span></div>
      </div>
      <div class="field">
        <label>左右位置</label>
        <div class="slider-row"><span>←</span><input type="range" id="offsetX" min="-100" max="100" value="0"><span>→</span></div>
      </div>
      <div class="field">
        <label>ズーム</label>
        <div class="slider-row"><span>−</span><input type="range" id="zoom" min="80" max="200" value="100"><span>+</span></div>
      </div>
      <div class="section-title">テキスト情報</div>
      <div class="field"><label>選手名（ローマ字）</label><input type="text" id="playerName" placeholder="例: TARO YAMADA"></div>
      <div class="field"><label>背番号</label><input type="text" id="playerNumber" placeholder="例: 7"></div>
      <div class="field"><label>ポジション</label><input type="text" id="playerPosition" placeholder="例: CENTER FIELDER"></div>
      <div class="field"><label>学年</label><input type="text" id="playerGrade" placeholder="例: 6年生"></div>
      <div class="field"><label>年度</label><input type="text" id="cardYear" value="2025"></div>
      <div class="field"><label>チーム名</label><input type="text" value="多摩ボーイズ" disabled><span class="fixed-badge">固定</span></div>
      <div class="field"><label>HP URL（QR固定）</label><input type="text" value="https://sites.google.com/view/tamaboys/" disabled style="font-size:11px"><span class="fixed-badge">固定</span></div>
      <button class="btn-gen" id="genBtn">カードを生成</button>
      <div class="btn-row">
        <button class="btn-dl" id="dlCard">カード1枚 PNG</button>
        <button class="btn-dl" id="dlPrint">印刷用 A4（9面）</button>
      </div>
    </div>
    <div class="panel">
      <div class="preview-wrap">
        <div class="empty-hint" id="emptyHint">情報を入力して<br>カードを生成してください<br><br><span style="font-size:11px;color:#bbb">縦向き名刺サイズ（55×91mm）<br>A4に9枚並べて印刷できます</span></div>
        <img id="cardImg" src="" style="display:none">
        <div class="preview-label" id="previewLabel" style="display:none">プレビュー（印刷サイズ: 55×91mm 縦向き）</div>
      </div>
    </div>
  </div>
</div>
<canvas id="cCard"></canvas>
<canvas id="cPrint"></canvas>

let logoImg=null, qrImg=null, photoImg=null;
function loadImg(src){return new Promise(res=>{const i=new Image();i.onload=()=>res(i);i.onerror=()=>res(null);i.src=src;});}
Promise.all([loadImg(LOGO_B64),loadImg(QR_B64)]).then(([l,q])=>{logoImg=l;qrImg=q;});

document.getElementById('photoFile').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    const i=new Image();i.onload=()=>{photoImg=i;};i.src=ev.target.result;
    const p=document.getElementById('uPreview');
    p.src=ev.target.result;p.style.display='block';
    document.getElementById('uText').style.display='none';
  };
  r.readAsDataURL(f);
});

let autoTimer=null;
['offsetY','offsetX','zoom'].forEach(id=>{
  document.getElementById(id).addEventListener('input',()=>{
    if(!photoImg)return;
    clearTimeout(autoTimer);
    autoTimer=setTimeout(()=>{triggerDraw(false);},80);
  });
});

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function drawCard(canvas,W,H,name,number,position,grade,year,s){
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');

  // ── 背景 ──
  ctx.fillStyle=NAVY;
  rr(ctx,0,0,W,H,12*s); ctx.fill();
  ctx.save(); ctx.clip();

  // ストライプ（控えめ）
  for(let i=-H;i<W+H;i+=28*s){
    ctx.fillStyle='rgba(255,255,255,0.022)';
    ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i+14*s,0);ctx.lineTo(i+14*s-H,H);ctx.lineTo(i-H,H);ctx.closePath();ctx.fill();
  }

  // ── 写真（フルブリード）──
  if(photoImg){
    const oxP=parseFloat(document.getElementById('offsetX').value)/100;
    const oyP=parseFloat(document.getElementById('offsetY').value)/100;
    const zP=parseFloat(document.getElementById('zoom').value)/100;
    const aS=photoImg.width/photoImg.height, aD=W/H;
    let sw,sh;
    if(aS>aD){sh=photoImg.height; sw=sh*aD;}
    else{sw=photoImg.width; sh=sw/aD;}
    sw/=zP; sh/=zP;
    sw=Math.min(sw,photoImg.width); sh=Math.min(sh,photoImg.height);
    const cx=photoImg.width/2 + oxP*(photoImg.width/4);
    const cy=photoImg.height/2 + oyP*(photoImg.height/4);
    let sx=cx-sw/2, sy=cy-sh/2;
    sx=Math.max(0,Math.min(photoImg.width-sw,sx));
    sy=Math.max(0,Math.min(photoImg.height-sh,sy));
    ctx.drawImage(photoImg,sx,sy,sw,sh,0,0,W,H);
  }

  // ── グラデーション ──
  // 下側：名前エリアを読みやすく（下28%を暗く）
  const gd=ctx.createLinearGradient(0,H*0.58,0,H);
  gd.addColorStop(0,'rgba(3,10,28,0)');
  gd.addColorStop(0.35,'rgba(3,10,28,0.75)');
  gd.addColorStop(1,'rgba(3,10,28,0.95)');
  ctx.fillStyle=gd; ctx.fillRect(0,0,W,H);

  // 上側：ロゴ・番号エリアを少し暗く（上14%）
  const gt=ctx.createLinearGradient(0,0,0,H*0.14);
  gt.addColorStop(0,'rgba(3,10,28,0.78)');
  gt.addColorStop(1,'rgba(3,10,28,0)');
  ctx.fillStyle=gt; ctx.fillRect(0,0,W,H*0.14);

  // ── Boysロゴ（左上・小さめ）──
  // 参考画像: カード幅の約38%、上から約4%の位置
  if(logoImg){
    const lW=Math.round(W*0.38);
    const lH=Math.round(lW*(logoImg.height/logoImg.width));
    const lX=Math.round(14*s);
    const lY=Math.round(10*s);
    ctx.save(); ctx.globalAlpha=0.92;
    ctx.drawImage(logoImg,lX,lY,lW,lH);
    ctx.restore();
  }

  // ── 背番号（右上・大きく）──
  // 参考画像: フォントサイズ = カード高さの約13%
  const numFontSize=Math.round(H*0.13);
  ctx.fillStyle=GOLD;
  ctx.font='bold '+numFontSize+'px sans-serif';
  ctx.textAlign='right';
  ctx.fillText('#'+number, W-Math.round(14*s), Math.round(H*0.135));

  // ── QRコード（右・中上）──
  // 参考画像: 幅カードの約30%、上から約22%の位置
  const qS=Math.round(W*0.30);
  const qX=W-qS-Math.round(14*s);
  const qY=Math.round(H*0.22);
  if(qrImg){
    ctx.fillStyle='rgba(255,255,255,0.97)';
    rr(ctx, qX-Math.round(6*s), qY-Math.round(6*s), qS+Math.round(12*s), qS+Math.round(26*s), Math.round(5*s));
    ctx.fill();
    ctx.drawImage(qrImg,qX,qY,qS,qS);
    ctx.fillStyle='#333';
    ctx.font='bold '+Math.round(8*s)+'px sans-serif';
    ctx.textAlign='center';
    ctx.fillText('選手募集中！', qX+qS/2, qY+qS+Math.round(18*s));
  }

  // ── ポジションバッジ（QRの下）──
  if(position){
    ctx.font='bold '+Math.round(9*s)+'px sans-serif';
    const pw=ctx.measureText(position).width+Math.round(16*s);
    const bw=Math.max(pw, qS+Math.round(12*s));
    const bX=W-bw-Math.round(14*s);
    const bY=qY+qS+Math.round(30*s);
    ctx.fillStyle=GOLD;
    rr(ctx,bX,bY,bw,Math.round(20*s),Math.round(4*s)); ctx.fill();
    ctx.fillStyle=NAVY; ctx.textAlign='center';
    ctx.fillText(position, bX+bw/2, bY+Math.round(14*s));
  }

  // ── テキストエリア（下部）──
  // 参考画像: 選手名は下から約22%、学年・URL・年度はその下
  const nameY = Math.round(H*0.80);

  // 選手名
  ctx.fillStyle='#ffffff';
  ctx.textAlign='left';
  let fs=Math.round(34*s);
  ctx.font='bold '+fs+'px sans-serif';
  const maxNameW=W-Math.round(20*s);
  while(ctx.measureText(name).width>maxNameW && fs>Math.round(14*s)){
    fs--; ctx.font='bold '+fs+'px sans-serif';
  }
  ctx.fillText(name, Math.round(16*s), nameY);

  // ゴールドアンダーライン
  ctx.fillStyle=GOLD;
  ctx.fillRect(Math.round(16*s), nameY+Math.round(4*s),
    Math.min(ctx.measureText(name).width, maxNameW), Math.round(2.5*s));

  // 学年
  if(grade){
    ctx.fillStyle='rgba(255,255,255,0.80)';
    ctx.font=Math.round(11.5*s)+'px sans-serif';
    ctx.fillText(grade, Math.round(16*s), nameY+Math.round(22*s));
  }

  // URL
  ctx.fillStyle='rgba(255,255,255,0.46)';
  ctx.font=Math.round(9*s)+'px sans-serif';
  ctx.fillText('sites.google.com/view/tamaboys/', Math.round(16*s), nameY+Math.round(40*s));

  // 多摩ボーイズ + 年度（いちばん下）
  ctx.fillStyle='rgba(232,196,74,0.65)';
  ctx.font='bold '+Math.round(9*s)+'px sans-serif';
  ctx.fillText('多摩ボーイズ  '+year, Math.round(16*s), nameY+Math.round(57*s));

  ctx.restore();

  // ── 金枠 ──
  ctx.strokeStyle=GOLD;
  ctx.lineWidth=Math.round(3.5*s);
  rr(ctx,Math.round(2*s),Math.round(2*s),W-Math.round(4*s),H-Math.round(4*s),Math.round(11*s));
  ctx.stroke();
}

function showPreview(dataUrl){
  const img=document.getElementById('cardImg');
  img.src=dataUrl; img.style.display='block';
  document.getElementById('emptyHint').style.display='none';
  document.getElementById('previewLabel').style.display='block';
}

function getInputs(){
  return {
    name:(document.getElementById('playerName').value.trim()||'PLAYER').toUpperCase(),
    number:document.getElementById('playerNumber').value.trim()||'0',
    position:(document.getElementById('playerPosition').value.trim()||'').toUpperCase(),
    grade:document.getElementById('playerGrade').value.trim()||'',
    year:document.getElementById('cardYear').value.trim()||'2025'
  };
}

function triggerDraw(showButtons){
  const {name,number,position,grade,year}=getInputs();
  const scale=CARD_W/370;
  const c=document.getElementById('cCard');
  drawCard(c,CARD_W,CARD_H,name,number,position,grade,year,scale);
  const cardUrl=c.toDataURL('image/png');
  showPreview(cardUrl);

  if(showButtons){
    const dlCard=document.getElementById('dlCard');
    const dlPrint=document.getElementById('dlPrint');
    dlCard.classList.add('show');
    dlPrint.classList.add('show');

    dlCard.onclick=()=>{
      const a=document.createElement('a');
      a.download=name.replace(/\s+/g,'_')+'_tamaboys_'+year+'.png';
      a.href=cardUrl; a.click();
    };

    dlPrint.onclick=()=>{
      const orig=dlPrint.textContent;
      dlPrint.textContent='生成中...';
      setTimeout(()=>{
        const {name,number,position,grade,year}=getInputs();
        const scale=CARD_W/370;
        const cp=document.getElementById('cPrint');
        cp.width=A4_W; cp.height=A4_H;
        const ctx2=cp.getContext('2d');
        ctx2.fillStyle='#ffffff'; ctx2.fillRect(0,0,A4_W,A4_H);
        const tmp=document.getElementById('cCard');
        drawCard(tmp,CARD_W,CARD_H,name,number,position,grade,year,scale);
        for(let row=0;row<ROWS;row++){
          for(let col=0;col<COLS;col++){
            const x=PAD_X+col*(CARD_W+PAD_X);
            const y=PAD_Y+row*(CARD_H+PAD_Y);
            ctx2.drawImage(tmp,x,y);
          }
        }
        const printUrl=cp.toDataURL('image/png');
        const a=document.createElement('a');
        a.download=name.replace(/\s+/g,'_')+'_tamaboys_'+year+'_A4print.png';
        a.href=printUrl; a.click();
        dlPrint.textContent=orig;
      },50);
    };
  }
}

document.getElementById('genBtn').addEventListener('click',()=>triggerDraw(true));
</script>
</body>
